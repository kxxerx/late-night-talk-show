<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>방문객 정보</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="blog-header slim gift">
    <div class="brand-stage">
      <a class="logo-slot" href="index.html" aria-label="홈으로">
        <img src="assets/site-logo.svg" alt="골든 마스코트 기프트샵 심야 토크쇼 특별관">
      </a>
    </div>
    <nav class="gift-menu" aria-label="기프트샵 메뉴">
      <a href="partner.html">특별관</a>
      <a href="inventory.html">쇼핑백</a>
      <a href="mypage.html">방문객 정보</a>
      <a href="codes.html">초대권 등록</a>
      <a href="admin.html">관리실</a>
    </nav>
  </header>

  <main class="container narrow-page">
    <section id="profileHero" class="profile-hero"></section>
    <div id="message" class="message"></div>

    <section class="grid compact-stats">
      <article class="card">
        <p class="muted">보유 재화</p>
        <p class="stat"><span id="currency">0</span> 조각</p>
      </article>
      <article class="card">
        <p class="muted">방문객 상태</p>
        <p class="stat"><span id="pollution">0</span> / 100</p>
      </article>
      <article class="card">
        <p class="muted">권한</p>
        <p class="stat" id="role">-</p>
      </article>
    </section>

    <section class="section panel">
      <h2>방문객 상태</h2>
      <div class="pollution-meter">
        <div id="pollutionBar" class="pollution-bar">0%</div>
      </div>
    </section>

    <section class="section panel">
      <h2>프로필</h2>
      <form id="profileForm">
        <label>표시 닉네임
          <input id="displayName" type="text">
        </label>
        <label>밴드 닉네임
          <input id="bandNickname" type="text">
        </label>
        <label>프로필 이미지 파일
          <input id="avatarFile" type="file" accept="image/*">
        </label>
        <label>프로필 이미지 URL
          <input id="avatarUrl" type="text" placeholder="파일 업로드 시 자동으로 채워집니다.">
        </label>
        <button type="submit">저장</button>
      </form>
    </section>

    <section class="two-column section">
      <article class="panel">
        <h2>최근 재화 기록</h2>
        <ul id="currencyLogs"></ul>
      </article>
      <article class="panel">
        <h2>최근 방문객 상태 기록</h2>
        <ul id="pollutionLogs"></ul>
      </article>
    </section>

    <section class="section panel danger-zone">
      <h2>기프트샵에서 나가기</h2>
      <p class="muted">기프트샵에서 나가기 처리는 프로필 비활성화와 보유 수치 초기화로 처리됩니다. 완전 삭제는 관리실가 Supabase에서 별도로 삭제해야 합니다.</p>
      <button id="withdrawBtn" class="danger">기프트샵에서 나가기 처리</button>
    </section>

    <span id="email" hidden></span>
    <span id="siteId" hidden></span>
  </main>
  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
