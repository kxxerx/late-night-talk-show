<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>내 정보</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="blog-header slim">
    <div class="brand-stage">
      <a class="logo-slot" href="index.html" aria-label="홈으로">
        <img src="assets/site-logo.svg" alt="사이트 로고">
      </a>
    </div>
    <nav class="main-menu" aria-label="주 메뉴">
      <a class="" href="index.html">상점</a>
      <a class="active" href="mypage.html">내 정보</a>
      <a class="" href="inventory.html">내 가방</a>
      <a class="" href="codes.html">이벤트 코드</a>
      <a class="" href="admin.html">관리자</a>
    </nav>
  </header>

  <main class="container narrow-page">
    <section id="profileHero" class="profile-hero"></section>
    <div id="message" class="message"></div>

    <section class="grid compact-stats">
      <article class="card">
        <p class="muted">보유 재화</p>
        <p class="stat"><span id="currency">0</span> 조각</p>
      </article>
      <article class="card">
        <p class="muted">오염도</p>
        <p class="stat"><span id="pollution">0</span> / 100</p>
      </article>
      <article class="card">
        <p class="muted">권한</p>
        <p class="stat" id="role">-</p>
      </article>
    </section>

    <section class="section panel">
      <h2>오염도</h2>
      <div class="pollution-meter">
        <div id="pollutionBar" class="pollution-bar">0%</div>
      </div>
    </section>

    <section class="section panel">
      <h2>프로필</h2>
      <form id="profileForm">
        <label>표시 닉네임
          <input id="displayName" type="text">
        </label>
        <label>밴드 닉네임
          <input id="bandNickname" type="text">
        </label>
        <label>프로필 이미지 파일
          <input id="avatarFile" type="file" accept="image/*">
        </label>
        <label>프로필 이미지 URL
          <input id="avatarUrl" type="text" placeholder="파일 업로드 시 자동으로 채워집니다.">
        </label>
        <button type="submit">저장</button>
      </form>
    </section>

    <section class="two-column section">
      <article class="panel">
        <h2>최근 재화 기록</h2>
        <ul id="currencyLogs"></ul>
      </article>
      <article class="panel">
        <h2>최근 오염도 기록</h2>
        <ul id="pollutionLogs"></ul>
      </article>
    </section>

    <section class="section panel danger-zone">
      <h2>탈퇴</h2>
      <p class="muted">탈퇴 처리는 프로필 비활성화와 보유 수치 초기화로 처리됩니다. 완전 삭제는 관리자가 Supabase에서 별도로 삭제해야 합니다.</p>
      <button id="withdrawBtn" class="danger">탈퇴 처리</button>
    </section>

    <span id="email" hidden></span>
    <span id="siteId" hidden></span>
  </main>
  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
