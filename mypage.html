<!doctype html>
<html lang="ko">
<head>
  <!-- pollution-shop-version: v5.2 -->
      <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>방문객 정보</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<script>
  try {
    if (localStorage.getItem("visitor_mode") === "entity") {
      document.documentElement.classList.add("entity-mode");
      document.body && document.body.classList.add("entity-mode");
    }
  } catch (_) {}
</script>

  <header class="blog-header slim noir">
    <div class="brand-stage">
      <a class="logo-slot" href="index.html" aria-label="홈으로">
        <img src="assets/site-logo.svg" alt="마스코트 골든의 기념품샵">
      </a>
    </div>

    <div class="category-strip">
      <a class="category-link" data-category="all" href="index.html">전체</a>
      <a class="category-link" data-category="main" href="index.html?category=main">기념품</a>
      <a class="category-link" data-category="cleanse" href="index.html?category=cleanse">스낵</a>
      <a class="category-link" data-category="special" href="index.html?category=special">특별 상품</a>
      <a class="category-link requires-login" href="partner.html" hidden>특별관</a>
    </div>

  </header>

  <main class="container narrow-page">
    <section id="profileHero" class="profile-hero"></section>
    <div id="message" class="message"></div>

    <section class="grid compact-stats two-card-stats">
      <article class="card">
        <p class="muted">보유 유쾌주화</p>
        <p class="stat"><span id="currency">0</span></p>
      </article>
      <article class="card">
        <p class="muted">방문객 상태</p>
        <p class="stat"><span id="pollution">0</span> / 100 <small id="pollutionStatusLabel" class="status-inline">안정</small></p>
      </article>
    </section>

    <section class="section panel">
      <h2>방문객 상태</h2>
      <div class="pollution-meter">
        <div id="pollutionBar" class="pollution-bar">0%</div>
      </div>
    </section>

    <section class="section panel">
      <h2>프로필</h2>
      <form id="profileForm">
        <label>사용자 이름
          <input id="displayName" type="text" readonly>
        </label>
        <label>밴드 닉네임
          <input id="bandNickname" type="text">
        </label>
        <label>프로필 이미지 파일
          <input id="avatarFile" type="file" accept="image/*">
        </label>
        <label>프로필 이미지 URL
          <input id="avatarUrl" type="text" placeholder="파일 업로드 시 자동으로 채워집니다.">
        </label>
        <div class="form-actions">
          <button type="submit">저장</button>
          <button id="clearAvatarBtn" type="button" class="button secondary">프로필 이미지 삭제</button>
        </div>
      </form>
    </section>

    <section class="two-column section">
      <article class="panel">
        <h2>최근 유쾌주화 기록</h2>
        <ul id="currencyLogs"></ul>
      </article>
      <article class="panel">
        <h2>최근 방문객 상태 기록</h2>
        <ul id="pollutionLogs"></ul>
      </article>
    </section>

    <section class="section panel danger-zone">
      <h2>기념품샵 떠나기</h2>
      <p class="muted">마스코트 골든의 기념품샵에서 나가면 방문객 정보는 더 이상 상점 이용에 사용되지 않습니다. 쇼핑백은 비워지고, 방문객 상태 기록도 더 이상 이어지지 않습니다.</p>
      <button id="withdrawBtn" class="danger">기념품샵 떠나기</button>
    </section>

    <span id="email" hidden></span>
    <span id="siteId" hidden></span>
  </main>
  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
