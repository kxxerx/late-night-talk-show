<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>상점</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="blog-header slim">
    <div class="brand-stage">
      <a class="logo-slot" href="index.html" aria-label="홈으로">
        <img src="assets/site-logo.svg" alt="사이트 로고">
      </a>
    </div>
    <div class="category-strip">
      <button class="category-link active" data-category="all">전체</button>
      <button class="category-link" data-category="main">메인 상점 아이템</button>
      <button class="category-link" data-category="cleanse">정화 아이템</button>
      <button class="category-link" data-category="event">이벤트 아이템</button>
      <button class="category-link" data-category="special">특수 아이템</button>
    </div>
  </header>

  <main class="container app-layout compact-shop">
    <section class="main-column">
      <div id="message" class="message"></div>
      <section id="shopList" class="shop-grid"></section>
    </section>
    <aside class="side-column" id="sidePanel"></aside>
  </main>
  <script type="module" src="js/home.js"></script>
</body>
</html>
