<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>방문객 입장</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="blog-header slim noir">
    <div class="brand-stage">
      <a class="logo-slot" href="index.html" aria-label="홈으로">
        <img src="assets/site-logo.svg" alt="골든 마스코트 기념품샵">
      </a>
    </div>

    <div class="category-strip">
      <a class="category-link" data-category="all" href="index.html">전체</a>
      <a class="category-link" data-category="main" href="index.html?category=main">기념품</a>
      <a class="category-link" data-category="cleanse" href="index.html?category=cleanse">분실물</a>
      <a class="category-link" data-category="special" href="index.html?category=special">특별 상품</a>
      <a class="category-link requires-login" href="partner.html" hidden>특별관</a>
    </div>

  </header>

  <main class="container auth-page">
    <section class="page-head-small">
      <h1>로그인</h1>
      <p class="muted">상점 화면 오른쪽에서도 로그인할 수 있습니다.</p>
    </section>
    <div id="message" class="message"></div>

    <section class="two-column">
      <article class="panel">
        <h2>로그인</h2>
        <form id="loginForm">
          <label>아이디
            <input id="loginId" type="text" required autocomplete="username" placeholder="아이디">
          </label>
          <label>비밀번호
            <input id="loginPassword" type="password" required autocomplete="current-password">
          </label>
          <button type="submit">로그인</button>
        </form>
      </article>

      <article class="panel">
        <h2>회원가입</h2>
        <form id="signupForm">
          <label>아이디
            <input id="signupLoginId" type="text" required minlength="3" maxlength="20" placeholder="영문/숫자/_/- 3~20자">
          </label>
          <label>비밀번호
            <input id="signupPassword" type="password" minlength="6" required autocomplete="new-password">
          </label>
          <label>표시 닉네임
            <input id="signupDisplayName" type="text" placeholder="사이트에서 보일 이름">
          </label>
          <button type="submit">회원가입</button>
        </form>
      </article>
    </section>
  </main>
  <script type="module" src="js/login.js"></script>
</body>
</html>
