<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로그인 | 오염도 상점</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  
<header class="site-header">
  <div class="header-inner">
    <a class="logo" href="index.html">오염도 상점</a>
    <nav id="nav" class="nav"></nav>
  </div>
</header>

  <main class="container auth-page">
    <section class="auth-hero">
      <p class="eyebrow">Welcome</p>
      <h1>오염도 상점 입장</h1>
      <p class="lead">이메일 대신 아이디와 비밀번호로 가입합니다. 내부적으로는 Supabase 때문에 가짜 이메일 형식으로 처리되지만, 사용자는 몰라도 됩니다. 이런 게 개발의 민낯이야.</p>
    </section>
    <div id="message" class="message"></div>

    <section class="two-column">
      <article class="panel">
        <h2>로그인</h2>
        <form id="loginForm">
          <label>아이디
            <input id="loginId" type="text" required autocomplete="username" placeholder="예: raven01">
          </label>
          <label>비밀번호
            <input id="loginPassword" type="password" required autocomplete="current-password">
          </label>
          <button type="submit">로그인</button>
        </form>
      </article>

      <article class="panel">
        <h2>회원가입</h2>
        <form id="signupForm">
          <label>아이디
            <input id="signupLoginId" type="text" required minlength="3" maxlength="20" placeholder="영문/숫자/_/- 3~20자">
          </label>
          <label>비밀번호
            <input id="signupPassword" type="password" minlength="6" required autocomplete="new-password">
          </label>
          <label>표시 닉네임
            <input id="signupDisplayName" type="text" placeholder="사이트에서 보일 이름">
          </label>
          <button type="submit">회원가입</button>
        </form>
      </article>
    </section>
  </main>
  <script type="module" src="js/login.js"></script>
</body>
</html>
