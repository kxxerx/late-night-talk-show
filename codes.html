<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>이벤트 코드</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="blog-header slim">
    <div class="brand-stage">
      <a class="logo-slot" href="index.html" aria-label="홈으로">
        <img src="assets/site-logo.svg" alt="사이트 로고">
      </a>
    </div>
  </header>

  <main class="container narrow-page">
    <section class="page-head-small">
      <h1>이벤트 코드</h1>
      <p class="muted">운영자가 안내한 코드를 입력하세요. 승인이 필요한 코드는 관리자가 확인한 뒤 반영됩니다.</p>
    </section>
    <div id="message" class="message"></div>

    <section class="panel">
      <h2>코드 입력</h2>
      <form id="codeForm">
        <label>이벤트 코드
          <input id="eventCode" type="text" required placeholder="예: TEST2026">
        </label>
        <button type="submit">제출</button>
      </form>
    </section>

    <section class="section panel">
      <h2>내 제출 내역</h2>
      <div id="submissionList"></div>
    </section>
  </main>
  <script type="module" src="js/codes.js"></script>
</body>
</html>
