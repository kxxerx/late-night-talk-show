<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>특별관</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="blog-header slim noir">
    <div class="brand-stage">
      <a class="logo-slot" href="index.html" aria-label="홈으로">
        <img src="assets/site-logo.svg" alt="골든 마스코트 기프트샵 심야 토크쇼 특별관">
      </a>
    </div>
  </header>

  <main class="container narrow-page">
    <section class="page-head-small soft-title">
      <h1>심야 토크쇼 특별관 초대권</h1>
      <p class="muted">골든 마스코트 기프트샵 안쪽에 마련된 심야 토크쇼 특별관입니다. 로그인한 방문객만 초대권을 열람할 수 있습니다.</p>
    </section>
    <div id="message" class="message"></div>

    <section class="panel invitation-card">
      <p class="eyebrow">Collaboration Gift</p>
      <h2>심야 토크쇼 특별관 초대권</h2>
      <p>이 초대장을 열면 제휴 밴드로 이동합니다. 무료지만, 무료라는 말이 언제나 안전하다는 뜻은 아니죠. 세상이 그렇게 친절했다면 우리가 이런 사이트를 만들고 있겠습니까.</p>
      <button id="openInviteBtn" type="button">무료 초대권 열기</button>
    </section>
  </main>
  <script type="module" src="js/partner.js"></script>
</body>
</html>
